# ==============================
#  GROUPBAR APPEARANCE SETTINGS
# ==============================
group:groupbar {
    # Basic Settings
    enabled = true                      # Enable groupbars
    height = 14                         # Groupbar height (px)
    priority = 3                        # Decoration priority level

    # Text Appearance
    font_family =                       # Custom font (defaults to main font)
    font_size = 8                       # Title font size
    font_weight_active = normal         # Active title weight
    font_weight_inactive = normal       # Inactive title weight
    render_titles = true                # Show window titles
    text_offset = 0                     # Vertical title adjustment
    text_color = 0xffffffff             # Default title color (white)
    text_color_inactive =               # Inactive title color
    text_color_locked_active =          # Locked active title color
    text_color_locked_inactive =        # Locked inactive title color

    # Visual Style
    gradients = false                   # Enable gradient effects
    stacked = false                     # Vertical stack layout
    scrolling = true                    # Scroll through group windows
    rounding = 1                        # Indicator corner radius
    gradient_rounding = 2               # Gradient corner radius
    round_only_edges = true             # Only round indicator edges
    gradient_round_only_edges = true    # Only round gradient edges

    # Indicator Settings
    indicator_height = 3                # Active indicator height
    indicator_gap = 0                   # Gap between indicator and title

    # Colors
    col.active = 0x66ffff00             # Active group background
    col.inactive = 0x66777700           # Inactive group background
    col.locked_active = 0x66ff5500      # Locked active background
    col.locked_inactive = 0x66775500    # Locked inactive background

    # Spacing
    gaps_in = 2                         # Internal gaps
    gaps_out = 2                        # External gaps
    keep_upper_gap = true               # Maintain top gap
}
