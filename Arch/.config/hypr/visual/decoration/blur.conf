# ======================
#  BLUR EFFECT SETTINGS
# ======================
decoration:blur {
    enabled = true                      # Enable kawase blur effect

    # Blur quality
    size = 8                            # Blur distance/radius (≥1)
    passes = 1                          # Blur passes (≥1, higher=better quality)

    # Performance
    ignore_opacity = true               # Ignore window opacity for blur
    new_optimizations = true            # Enable performance optimizations
    xray = false                        # Floating windows ignore tiled in blur

    # Visual tuning
    noise = 0.0117                      # Noise amount [0.0-1.0]
    contrast = 0.8916                   # Contrast modulation [0.0-2.0]
    brightness = 0.8172                 # Brightness modulation [0.0-2.0]
    vibrancy = 0.1696                   # Color saturation boost [0.0-1.0]
    vibrancy_darkness = 0.0             # Vibrancy strength in dark areas [0.0-1.0]

    # Special cases
    special = false                     # Blur behind special workspace (performance heavy)
    popups = false                      # Blur behind popup menus
    popups_ignorealpha = 0.2            # Popup alpha threshold for blur [0.0-1.0]
    input_methods = false               # Blur behind IME windows
    input_methods_ignorealpha = 0.2     # IME alpha threshold for blur [0.0-1.0]
}
