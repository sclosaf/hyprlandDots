# ===============================
#  MISCELLANEOUS SYSTEM SETTINGS
# ===============================
misc {
    # Visual Elements
    disable_hyprland_logo = true       # Disable anime background
    disable_splash_rendering = true    # Disable splash screen
    col.splash = 0xffffffff             # Splash text color
    force_default_wallpaper = -1        # -1=random, 0-2=default wallpapers
    background_color = 0x111111         # Background color (if logo disabled)

    # Font Settings
    font_family = Sans                  # System-wide default font
    splash_font_family =                # Splash screen font (system default)

    # Power Management
    mouse_move_enables_dpms = false     # Wake monitors on mouse movement
    key_press_enables_dpms = false      # Wake monitors on key press
    vfr = true                          # Variable frame rate (recommended)
    vrr = 0                             # Adaptive Sync (0=off, 1=on, 2=fullscreen only)

    # Window Behavior
    always_follow_on_dnd = true         # Focus follows mouse during drag-and-drop
    layers_hog_keyboard_focus = true    # Keep focus on interactive layers
    animate_manual_resizes = true      # Animate window resizing
    animate_mouse_windowdragging = false # Animate window dragging
    new_window_takes_over_fullscreen = 0 # 0=behind, 1=replace, 2=unfullscreen
    exit_window_retains_fullscreen = false # Keep fullscreen on window close
    initial_workspace_tracking = 1      # 0=disabled, 1=single-shot, 2=persistent
    close_special_on_empty = true       # Close empty special workspaces

    # Input Handling
    mouse_move_focuses_monitor = true   # Focus monitor on mouse entry
    middle_click_paste = true           # Enable primary selection paste
    disable_autoreload = false          # Disable config auto-reload

    # Window Swallowing
    enable_swallow = false              # Enable terminal window swallowing
    swallow_regex =                     # Window class regex to swallow
    swallow_exception_regex =           # Title regex to exclude from swallowing

    # Session Management
    allow_session_lock_restore = false  # Allow restarting crashed lockscreen
    session_lock_xray = false           # Show workspaces below lockscreen
    lockdead_screen_delay = 1000        # Delay for lockdead screen (ms)

    # System Behavior
    focus_on_activate = false           # Focus apps requesting activation
    render_unfocused_fps = 15           # Background window FPS limit
    enable_anr_dialog = true            # Show App Not Responding dialog
    anr_missed_pings = 1                # Missed pings before ANR dialog
    disable_xdg_env_checks = false      # Disable XDG environment warnings
    disable_hyprland_qtutils_check = false # Disable qtutils warning
}
