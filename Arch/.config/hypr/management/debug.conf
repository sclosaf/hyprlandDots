# ==================================
#  DEBUGGING AND DEVELOPER SETTINGS
# ==================================
debug {
    # Visual Debugging
    overlay = false                     # Show performance overlay (disables VFR)
    damage_blink = false                # Flash updated areas (epilepsy warning!)
    pass = false                        # Enable render pass debugging

    # Logging Configuration
    disable_logs = true                 # Disable file logging
    disable_time = true                 # Disable timestamps in logs
    enable_stdout_logs = false          # Enable console output logging
    colored_stdout_logs = true          # Colorized console output
    suppress_errors = false             # Hide config parsing errors
    error_limit = 5                     # Max displayed config errors
    error_position = 0                  # 0=top, 1=bottom

    # System Behavior
    damage_tracking = 2                 # 0=none, 1=monitor, 2=full
    watchdog_timeout = 5                # Thread watchdog timer (0=disabled)
    disable_scale_checks = false        # Skip scale factor verification
    full_cm_proto = false               # Claim all CM protocol features

    # Developer Tools
    manual_crash = 0                    # Set to 1 then 0 to force crash
}
