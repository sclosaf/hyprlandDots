# ========================
#  HYPRLOCK CONFIGURATION
# ========================

# ------------------
#  General Settings
# ------------------
general {
    hide_cursor = false                 # Keep cursor visible
    ignore_empty_input = false          # Require password input
    immediate_render = false            # Wait for full resources to load
    text_trim = true                   # Trim trailing whitespace from text
    fractional_scaling = 2              # 0=off, 1=on, 2=auto
    screencopy_mode = 0                 # 0=GPU, 1=CPU (slow)
    fail_timeout = 2000                 # Reset UI after failed attempt (ms)
}

# -------------------------
#  Authentication Settings
# -------------------------
auth {
    pam {
        enabled = true                  # Enable PAM authentication
        module = "hyprlock"             # PAM module (falls back to "su")
    }

    fingerprint {
        enabled = false                 # Disable fingerprint by default
        ready_message = "(Scan fingerprint to unlock)"
        present_message = "Scanning fingerprint"
        retry_delay = 250               # Delay after failed scan (ms)
    }
}

# --------------------
#  Animation Settings
# --------------------
animations {
    enabled = true                      # Enable unlock animations
}
