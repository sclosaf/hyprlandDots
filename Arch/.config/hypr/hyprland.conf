# ==================================
#  HYPRLAND MAIN CONFIGURATION FILE
# ==================================

# ====================
#  CORE CONFIGURATION
# ====================
## Essential system variables and settings
source = ./management/variables.conf
source = ./management/colors.conf
source = ./visual/monitor.conf

# =====================
#  INPUT CONFIGURATION
# =====================
## Keyboard and pointing device settings
source = ./keyboard/kblayout.conf          # Keyboard layout
source = ./keyboard/input.conf             # General input settings
source = ./keyboard/input/touchpad.conf    # Touchpad specific settings
source = ./keyboard/gestures.conf          # Touchpad gestures
source = ./keyboard/binds.conf             # Key bindings

# ===================
#  WINDOW MANAGEMENT
# ===================
## Window rules and layer management
source = ./rules/windowrules.conf          # Application-specific rules
source = ./rules/layerrules.conf           # Layer/surface rules

# ===================
#  VISUAL APPEARANCE
# ===================
## UI styling and visual effects
# Base visual settings
source = ./visual/general.conf             # General UI settings
source = ./visual/layout.conf              # Window layout defaults

# Decoration components
source = ./visual/decoration.conf          # Main decoration settings
source = ./visual/decoration/shadow.conf   # Shadow configuration
source = ./visual/decoration/blur.conf     # Blur effects

# Advanced visual elements
source = ./visual/animations.conf          # Window animations
source = ./visual/cursor.conf              # Cursor settings
source = ./visual/group.conf               # Window grouping
source = ./visual/group/groupbar.conf      # Group bar styling

# ===================
#  SYSTEM MANAGEMENT
# ===================
## Background processes and utilities
source = ./management/autostart.conf       # Startup applications
source = ./management/hypridle.conf        # Idle management
source = ./management/hyprlock.conf        # Lock screen
source = ./management/ecosystem.conf       # External integrations
source = ./management/debug.conf           # Debug settings
source = ./management/misc.conf            # Miscellaneous settings
