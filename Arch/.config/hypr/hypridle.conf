# ========================
#  HYPRIDLE CONFIGURATION
# ========================

# ------------------
#  General Settings
# ------------------
general {
    # Session Lock/Unlock Commands
    lock_cmd = pidof hyprlock || hyprlock       # Lock when dbus requests it
    unlock_cmd = notify-send "Unlocked!"        # Custom unlock notification

    # Session State Handlers
    on_lock_cmd = systemctl --user stop idle-inhibit.target  # Release inhibitors
    on_unlock_cmd = systemctl --user start idle-inhibit.target

    # Sleep Handlers
    before_sleep_cmd = loginctl lock-session    # Lock before sleep
    after_sleep_cmd = hyprctl dispatch dpms on  # Wake display after sleep

    # Inhibitor Control
    ignore_dbus_inhibit = false        # Respect app idle requests (e.g. videos)
    ignore_systemd_inhibit = false     # Respect systemd inhibitors
    ignore_wayland_inhibit = false     # Respect Wayland protocol inhibitors
    inhibit_sleep = 2                  # 0=off, 1=basic, 2=auto, 3=strict lock
}

# ----------------
#  Idle Listeners
# ----------------

# Dim screen after 5 minutes
listener {
    timeout = 300                      # 5 minutes
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r       # Restore brightness
    ignore_inhibit = false             # Respect video playback/etc
}

# Turn off screen after 10 minutes
listener {
    timeout = 600                      # 10 minutes
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Lock after 15 minutes
listener {
    timeout = 900                      # 15 minutes
    on-timeout = hyprlock
    ignore_inhibit = true              # Lock even if video is playing
}

# Suspend after 30 minutes
listener {
    timeout = 1800                     # 30 minutes
    on-timeout = systemctl suspend
}
