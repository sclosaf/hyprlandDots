# ===========================
#  TOUCHPAD GESTURE SETTINGS
# ===========================
gestures {

    # Basic Swipe Configuration
    workspace_swipe_distance = 300       # Swipe distance threshold in pixels

    # Touchscreen Support
    workspace_swipe_touch = false        # Enable edge swipes on touchscreens
    workspace_swipe_touch_invert = false # Invert touchscreen swipe direction

    # Swipe Behavior
    workspace_swipe_invert = true        # Invert touchpad swipe direction
    workspace_swipe_min_speed_to_force = 30 # Minimum speed to force workspace change (px/ms)
    workspace_swipe_cancel_ratio = 0.25   # Swipe completion ratio to trigger [0.0-1.0]
    workspace_swipe_create_new = true    # Create new workspace when swiping past last
    workspace_swipe_forever = false      # Enable continuous workspace cycling

    # Advanced Controls
    workspace_swipe_direction_lock = true # Enable swipe direction locking
    workspace_swipe_direction_lock_threshold =15 # Distance before lock activates (px)
    workspace_swipe_use_r = false        # Use 'r' prefix instead of 'm' for workspaces
}
