# ========================
#  GENERAL INPUT SETTINGS
# ========================
input {
    # Keyboard Settings
    kb_model =                          # XKB keyboard model (see /usr/share/X11/xkb/rules/base.lst)
    kb_layout = it                      # Keyboard layout (e.g., us, de, fr)
    kb_variant =                        # Keyboard variant
    kb_options =
    kb_rules =                          # Keyboard rules
    kb_file =                           # Path to custom .xkb file

    # Keyboard Behavior
    numlock_by_default = false          # Enable NumLock by default
    resolve_binds_by_sym = false        # Keybind behavior with multiple layouts
    repeat_rate = 25                    # Key repeat rate (per second)
    repeat_delay = 600                  # Key repeat delay (ms)

    # Mouse Settings
    sensitivity = 0.8                   # Pointer sensitivity (-1.0 to 1.0)
    accel_profile = flat                    # Pointer profile (adaptive/flat/custom)
    force_no_accel = false              # Disable all acceleration (not recommended)
    left_handed = false                 # Swap left/right mouse buttons
    scroll_factor = 1.0                 # Scroll speed multiplier for mice
    natural_scroll = false              # Reverse scroll direction

    # Focus Behavior
    follow_mouse = 1                    # 0=disabled, 1=strict, 2=click, 3=loose
    follow_mouse_threshold = 0.0        # Minimum movement to trigger focus (px)
    focus_on_close = 0                  # 0=next window, 1=window under cursor
    mouse_refocus = true                # Smart focus switching
    float_switch_override_focus = 1     # Focus behavior when changing window states
    special_fallthrough = false         # Allow focusing regular workspace from special
    off_window_axis_events = 1          # Handle scroll events near window edges
    emulate_discrete_scroll = 1         # Handle high-res scroll events
}
