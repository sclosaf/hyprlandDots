# ==========================
#  CURSOR BEHAVIOR SETTINGS
# ==========================
cursor {
    # Visibility Settings
    inactive_timeout = 5                # Auto-hide after inactivity (0=disabled)
    hide_on_key_press = true           # Hide when typing until mouse moves
    hide_on_touch = true                # Hide after touch input

    # Appearance
    sync_gsettings_theme = true         # Match GTK cursor theme/size
    enable_hyprcursor = true            # Enable Hyprland cursor support

    # Hardware Optimization
    no_hardware_cursors = 2             # 0=use HW, 1=disable HW, 2=auto (no tearing)
    use_cpu_buffer = 2                  # 0=off, 1=on, 2=auto (Nvidia only)
    no_break_fs_vrr = 2                 # 0=off, 1=on, 2=auto (game content)
    min_refresh_rate = 24               # Minimum cursor refresh rate (Hz)

    # Positioning
    hotspot_padding = 1                 # Gap from screen edges (px)
    default_monitor =                   # Startup monitor for cursor
    persistent_warps = false            # Remember cursor position per window
    no_warps = false                    # Disable automatic cursor warping
    warp_back_after_non_mouse_input = false # Return cursor after keyboard movement

    # Workspace Behavior
    warp_on_change_workspace = 0        # 0=disabled, 1=enabled, 2=forced
    warp_on_toggle_special = 0          # 0=disabled, 1=enabled, 2=forced

    # Zoom Features
    zoom_factor = 1.0                   # Magnification level (≥1.0)
    zoom_rigid = false                  # Strict vs loose zoom following
}
