# ==================================
#  HYPRLAND MAIN CONFIGURATION FILE
# ==================================

# ====================
#  CORE CONFIGURATION
# ====================
## Essential system variables and settings
source = ~/.config/hypr/management/variables.conf
source = ~/.config/hypr/management/colors.conf
source = ~/.config/hypr/visual/monitor.conf
source = ~/.config/hypr/management/environment.conf

# =====================
#  INPUT CONFIGURATION
# =====================
## Keyboard and pointing device settings
source = ~/.config/hypr/keyboard/input.conf             # General input settings
source = ~/.config/hypr/keyboard/input/touchpad.conf    # Touchpad specific settings
source = ~/.config/hypr/keyboard/input/mouse.conf      # Mouse specific settings
source = ~/.config/hypr/keyboard/gestures.conf          # Touchpad gestures
source = ~/.config/hypr/keyboard/binds.conf             # Key bindings

# ===================
#  WINDOW MANAGEMENT
# ===================
## Window rules and layer management
source = ~/.config/hypr/rules/windowrules.conf          # Application-specific rules

# ===================
#  VISUAL APPEARANCE
# ===================
## UI styling and visual effects
# Base visual settings
source = ~/.config/hypr/visual/general.conf             # General UI settings
source = ~/.config/hypr/visual/layout.conf              # Window layout defaults
source = ~/.config/hypr/visual/general/snap.conf       # Window snapping settings

# Decoration components
source = ~/.config/hypr/visual/decoration.conf          # Main decoration settings
source = ~/.config/hypr/visual/decoration/shadow.conf   # Shadow configuration
source = ~/.config/hypr/visual/decoration/blur.conf     # Blur effects

# Advanced visual elements
source = ~/.config/hypr/visual/animations.conf          # Window animations
source = ~/.config/hypr/visual/cursor.conf              # Cursor settings
source = ~/.config/hypr/visual/group.conf               # Window grouping
source = ~/.config/hypr/visual/group/groupbar.conf      # Group bar styling

# ===================
#  SYSTEM MANAGEMENT
# ===================
## Background processes and utilities
source = ~/.config/hypr/management/autostart.conf       # Startup applications
source = ~/.config/hypr/management/ecosystem.conf       # External integrations
source = ~/.config/hypr/management/misc.conf            # Miscellaneous settings
