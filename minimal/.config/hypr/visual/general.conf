# ====================================
#  GENERAL WINDOW MANAGEMENT SETTINGS
# ====================================
general {
    # Window borders
    border_size = 0                     # Thickness of window borders (px)
    gaps_in = 2                      # Gap between windows (or CSS-style: top,right,bottom,left)
    gaps_out = 2                   # Gap between windows and screen edge
    gaps_workspaces = 0                 # Extra gap between workspaces (stacks with gaps_out)

    layout = dwindle                    # Default layout (dwindle or master)
    no_focus_fallback = true           # Disable focus fallback to nearest window

    # Border interactions
    resize_on_border = true            # Enable resizing by dragging borders/gaps
    extend_border_grab_area = 15        # Extra grab area around borders (px)
    hover_icon_on_border = true         # Show cursor icon when hovering borders
    resize_corner = 0                   # Force resize corner (0=disabled, 1-4=clockwise from top-left)

    allow_tearing = false               # Enable tearing for reduced latency (vsync off)
}
