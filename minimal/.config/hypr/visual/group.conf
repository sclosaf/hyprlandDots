# ==========================
#  WINDOW GROUPING SETTINGS
# ==========================
group {
    # Group Behavior
    auto_group = true                   # Automatically group new windows
    insert_after_current = true         # New windows go after current in group
    focus_removed_window = true         # Focus window when removed from group

    # Drag and Merge
    drag_into_group = 1                 # 0=disabled, 1=enabled, 2=groupbar only
    merge_groups_on_drag = true         # Allow merging groups by dragging
    merge_groups_on_groupbar = true     # Allow merging via groupbar
    merge_floated_into_tiled_on_groupbar = false # Merge float-to-tiled via groupbar
    group_on_movetoworkspace = false    # Merge when moving to new workspace

    # Border Colors
    col.border_active = 0x66ffff00      # Active group border (yellow)
    col.border_inactive = 0x66777700    # Inactive group border
    col.border_locked_active = 0x66ff5500 # Active locked group border
    col.border_locked_inactive = 0x66775500 # Inactive locked group border
}
