# ========================
#  HYPRLAND COLOR PALETTE
# ========================

# --- Base Backgrounds ---
# Main background (very dark blue-gray)
$base      = rgba(1E1E2Eff)
# Secondary background (slightly lighter blue-gray)
$mantle    = rgba(181825ff)
# Tertiary background (deep violet-black)
$crust     = rgba(11111Bff)

# --- Surface Layers ---
# Dark surface for cards and panels
$surface   = rgba(1E1E1Eff)
# Variant for surfaces (almost black)
$surface_variant = rgba(252525ff)

# --- UI Text Colors ---
# Primary readable text on dark bg (soft white)
$text      = rgba(CDD6F4ff)
# Secondary text (muted light blue-gray)
$subtext   = rgba(BAC2DEff)
# UI overlay elements (soft gray-violet)
$overlay   = rgba(6E7086ff)
# Text on dark backgrounds
$on_background = rgba(FFFFFFff)
# Text on surface elements
$on_surface = rgba(FFFFFFff)

# --- Accent Colors (Pastel Highlights) ---
# Soft pink highlight for backgrounds or titles
$rosewater = rgba(F5E0DCff)
# Light coral for minor interactive elements
$flamingo  = rgba(F2CDCDff)
# Bright pink for buttons or icons
$pink      = rgba(F5C2E7ff)
# Light purple for active borders or tabs
$mauve     = rgba(CBA6F7ff)
# Bold red for errors and alerts
$red       = rgba(F38BA8ff)
# Muted red for subtle error states
$maroon    = rgba(EBA0ACff)
# Soft orange for important notifications
$peach     = rgba(FAB387ff)
# Light yellow for non-critical warnings
$yellow    = rgba(F9E2AFff)
# Fresh green for success states
$green     = rgba(A6E3A1ff)
# Cool teal for informative tags
$teal      = rgba(94E2D5ff)
# Light sky blue for secondary actions or links
$sky       = rgba(89DCEBff)
# Bright cyan-blue for primary alternative actions
$sapphire  = rgba(74C7ECff)
# Interactive elements (buttons, tabs)
$blue      = rgba(89B4FAff)
# Highlighting text selections
$lavender  = rgba(B4BEFEff)

# --- Material UI Core Colors ---
# Material primary purple
$primary           = rgba(6200EEff)
# Darker variant of primary
$primary_variant   = rgba(3700B3ff)
# Material secondary teal
$secondary         = rgba(03DAC6ff)
# Darker secondary variant
$secondary_variant = rgba(018786ff)
# Bright amber accent
$accent            = rgba(FFD600ff)

# --- System States ---
# Warning or alert (amber)
$warning  = rgba(FFC107ff)
# Success green
$success  = rgba(4CAF50ff)
# Info blue
$info     = rgba(2196F3ff)
# Error red (material design)
$error    = rgba(CF6679ff)
# Text on error background
$on_error = rgba(FFFFFFff)

# --- UI Borders & Shadows ---
# Light border (very transparent white)
$border_light = rgba(FFFFFF15)
# Dark border (slightly more visible)
$border_dark  = rgba(00000030)
# Shadow overlay (used for depth)
$shadow       = rgba(00000060)

# --- Special Effects ---
# Dim overlay (semi-transparent black)
$dim     = rgba(00000080)
# Modal scrim overlay
$scrim   = rgba(000000B3)
# Subtle highlight (selection, focus)
$highlight = rgba(FFFFFF12)

# --- Dark & Light Mode Variants ---
# Dark mode primary (soft violet)
$dark_primary   = rgba(BB86FCff)
# Dark surface background
$dark_surface   = rgba(121212ff)
# Light mode primary (same as base primary)
$light_primary  = rgba(6200EEff)
# Light surface (for light mode themes)
$light_surface  = rgba(FFFFFFff)

# --- Accessibility / High Contrast ---
# High contrast primary blue
$hc_primary     = rgba(0000FFff)
# Text on high contrast primary
$hc_on_primary  = rgba(FFFFFFff)

# --- Gradients ---
# Start color for gradients
$gradient_start = rgba(6200EEff)
# End color for gradients
$gradient_end   = rgba(03DAC6ff)

# --- Legacy / Compatibility Support ---
# X11 standard red
$color_red   = rgba(FF0000ff)
# X11 standard green
$color_green = rgba(00FF00ff)
# X11 standard blue
$color_blue  = rgba(0000FFff)
