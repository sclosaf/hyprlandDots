general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    grace = 0
    disable_loading_bar = false
    ignore_empty_input = false          
    immediate_render = false           
    text_trim = true                  
    fractional_scaling = 2          
    screencopy_mode = 0            
    fail_timeout = 0              
}

background {
    monitor = eDP-1
    path = ~/.wallpapers/hyprlock/wallpaperlock.png
    color = rgba(0, 0, 0, 1.0)
    blur_passes = 0
    blur_size = 0
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}


# Date Display
label {
    monitor = eDP-1
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B,")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 30
    font_family = JetBrains Mono Nerd Font
    position = 40, -240
    halign = left
    valign = top
}

# Time Display
label {
    monitor = eDP-1
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 180
    font_family = JetBrains Mono Nerd Font
    position = 25, -100
    halign = left
    valign = top
}

label {
    monitor = eDP-1
    text = Welcome back $USER
    color = rgba(216, 222, 233, 0.70)
    font_size = 16
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 300
    halign = center
    valign = bottom
}

input-field {
    monitor = eDP-1
    size = 270, 70
    outline_thickness = 2
    dots_size = 0.2 
    dots_spacing = 0.3 
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.4)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    font_family = JetBrains Mono Nerd Font
    placeholder_text = <i><span foreground="##eceff499"></span></i>
    hide_input = false
    position = 0, 200
    halign = center
    valign = bottom
}

# Battery status
label {
    monitor = eDP-1
    text = cmd[update:1000] echo -e "$(bash ~/.scripts/hyprlock/batteryStatus.sh)"
    color = rgba(216, 222, 233, 0.70)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = -15, -10
    halign = right
    valign = top
}
