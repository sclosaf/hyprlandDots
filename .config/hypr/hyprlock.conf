general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
    ignore_empty_input = false          # Require password input
    immediate_render = false            # Wait for full resources to load
    text_trim = true                   # Trim trailing whitespace from text
    fractional_scaling = 2              # 0=off, 1=on, 2=auto
    screencopy_mode = 0                 # 0=GPU, 1=CPU (slow)
    fail_timeout = 0                 # Reset UI after failed attempt (ms)
}

background {
    monitor = eDP-1
    path = ~/.wallpapers/hyprlock/wallpaperlock.jpg
    color = rgba(0, 0, 0, 1.0)
    blur_passes = 0
    blur_size = 0
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}


input-field {
    monitor = eDP-1
    size = 250, 60
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgba(242, 243, 244, 0.8)
    fade_on_empty = true
    rounding = -1
    check_color = rgb(0, 0, 0)
    placeholder_text = <span foreground="##f2f3f4"></span>
    fail_color = rgba(255, 0, 0, 0.7)
    fail_text = <span foreground="##f2f3f4"></span>
    capslock_color = rgba(255, 255, 0, 1)
    hide_input = false
    position = 0, 350
    halign = center
    valign = bottom
}

# Date Display
label {
    monitor = eDP-1
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(242, 243, 244, 0.8)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 500
    halign = center
    valign = center
}

# Time Display
label {
    monitor = eDP-1
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgba(242, 243, 244, 0.8)
    font_size = 95
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 400
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = Welcome back $USER
    color = rgba(255, 255, 255, 0.6)
    font_size = 16
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 410
    halign = center
    valign = bottom
}
