# ====================================
#  GENERAL WINDOW MANAGEMENT SETTINGS
# ====================================
general {
    # Window borders
    border_size = 3                     # Thickness of window borders (px)
    no_border_on_floating = false       # Disable borders for floating windows

    # Gaps and spacing
    gaps_in = 5                         # Gap between windows (or CSS-style: top,right,bottom,left)
    gaps_out = 10                       # Gap between windows and screen edge
    float_gaps = 0                      # Gaps for floating windows (-1 = default)
    gaps_workspaces = 0                 # Extra gap between workspaces (stacks with gaps_out)

    # Border colors
    col.inactive_border = 0x595959aa    # Inactive window border (dark gray)
    col.active_border = 0x959595aa 0x595959aa 40deg    # Active window border (white)
    col.nogroup_border = 0x595959aa      # Border for non-groupable windows (inactive)
    col.nogroup_border_active = 0x595959aa # Active border for non-groupable windows

    # Layout and focus
    layout = dwindle                    # Default layout (dwindle or master)
    no_focus_fallback = true           # Disable focus fallback to nearest window

    # Border interactions
    resize_on_border = true            # Enable resizing by dragging borders/gaps
    extend_border_grab_area = 15        # Extra grab area around borders (px)
    hover_icon_on_border = true         # Show cursor icon when hovering borders
    resize_corner = 0                   # Force resize corner (0=disabled, 1-4=clockwise from top-left)

    # Performance
    allow_tearing = false               # Enable tearing for reduced latency (vsync off)
}
