animations {
    enabled = true                      # Master switch for all animations
    first_launch_animation = true       # Enable splash animation on first app launch
    workspace_wraparound = false        # Circular workspace transitions (false=linear)

    # Existing curves
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56

    # Integrated curves (if not present)
    bezier = easeIn, 0.42, 0.0, 1, 1
    bezier = easeOut, 0.0, 0.0, 0.58, 1
    bezier = balanced, 0.2, 0, 0.3, 1
    bezier = smooth, 0.25, 0.1, 0.25, 1
    bezier = crisp, 0.3, 0, 0.4, 1
    bezier = flow, 0.15, 0, 0.35, 1

    # Existing animations
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade

    # Integrated window animations (if not already present or different)
    animation = windows, 1, 4, smooth
    animation = windowsIn, 1, 3, balanced, slide
    animation = windowsOut, 1, 2, crisp, slide
    animation = windowsMove, 1, 3, flow

    # Integrated fade animations
    animation = fadeLayers, 1, 2, smooth

    # Integrated layer animations
    animation = layers, 1, 2, balanced
    animation = layersIn, 1, 2, smooth, slide
    animation = layersOut, 1, 1, crisp, slide

    # Integrated border animation
    animation = border, 1, 4, balanced

    # Integrated workspace animations
    animation = workspaces, 1, 4, flow, slide

    # Integrated special workspace animations
    animation = specialWorkspaceIn, 1, 2, easeIn, fade
    animation = specialWorkspaceOut, 1, 2, easeOut, fade
}

