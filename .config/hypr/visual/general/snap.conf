# ================================
#  FLOATING WINDOW SNAPPING RULES
# ================================
general:snap {
    enabled = false                     # Enable snapping for floating windows
    window_gap = 10                     # Minimum gap between windows before snapping (px)
    monitor_gap = 10                    # Minimum gap to screen edge before snapping (px)

    # Snapping behavior
    border_overlap = false              # Snap windows with only 1 border-width gap between them
    respect_gaps = false                # Respect general:gaps_in when snapping
}
