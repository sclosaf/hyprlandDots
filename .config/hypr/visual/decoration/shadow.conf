# ========================
#  SHADOW EFFECT SETTINGS
# ========================
decoration:shadow {
    enabled = false                      # Enable window shadows

    # Shadow appearance
    range = 12                           # Shadow size/distance (layout pixels)
    render_power = 3                    # Falloff sharpness [1-4]
    sharp = false                       # Infinite falloff (ultra-sharp edges)
    ignore_window = true                # Don't render shadow behind window

    # Color settings
    color = 0xee1a1a1a                 # Shadow color (RGBA)
    color_inactive = 0xee1a1a1a                   # Inactive shadow color (defaults to color)

    # Positioning
    offset = 0.0 0.0                     # Shadow offset x y
    scale = 1.0                         # Shadow scale [0.0-1.0]
}
