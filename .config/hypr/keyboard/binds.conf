binds {
    pass_mouse_when_bound = false
        scroll_event_delay = 0

        drag_threshold = 0

        workspace_back_and_forth = false
        hide_special_on_workspace_change = true
        allow_workspace_cycles = false
        workspace_center_on = 0

        focus_preferred_method = 0
        movefocus_cycles_fullscreen = false
        movefocus_cycles_groupfirst = false
        window_direction_monitor_fallback = true

        ignore_group_lock = false

        disable_keybind_grabbing = false
        allow_pin_fullscreen = false
}

# $mod ops
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, name:0

bind = $mod, C, killactive

bind = $mod, T, togglesplit
bind = $mod, Y, togglefloating
bind = $mod, F, fullscreen, 1

bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod, S, togglespecialworkspace, magic

bind = $mod, Tab, workspace, +1

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# $mod + shift ops
bind = $mod SHIFT, Q, exec, $terminal
bind = $mod SHIFT, E, exec, $fileManager
bind = $mod SHIFT, R, exec, $menu
bind = $mod SHIFT, W, exec, $browser

bind = $mod SHIFT, F, fullscreen, 0

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

bind = $mod SHIFT, S, movetoworkspace, special:magic

bind = $mod SHIFT, Tab, workspace, -1

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, name:0

# $mod + ctrl
bind = $mod CTRL, Tab, movetoworkspace, r+1


# $mod + shift + ctrl ops
bind = $mod SHIFT CTRL, Q, exec, [float; size 1400 900; center] $terminal
bind = $mod SHIFT CTRL, R, exec, hyprctl reload

bind = $mod SHIFT CTRL, l, resizeactive, 50 0
bind = $mod SHIFT CTRL, h, resizeactive, -50 0
bind = $mod SHIFT CTRL, k, resizeactive, 0 -50
bind = $mod SHIFT CTRL, j, resizeactive, 0 50

bind = $mod SHIFT CTRL, S, movetoworkspacesilent, special:magic

bind = $mod SHIFT CTRL, Tab, movetoworkspace, r-1

# others

bind = , Print, exec, grim -g "$(slurp)" ~/Downloads/screenshot-area-$(date +'%Y%m%d-%H%M%S').png && wl-copy < ~/Downloads/screenshot-area-$(date +'%Y%m%d-%H%M%S').png
bind = SHIFT, Print, exec, grim ~/Downloads/screenshot-full-$(date +'%Y%m%d-%H%M%S').png && wl-copy < ~/Downloads/screenshot-full-$(date +'%Y%m%d-%H%M%S').png

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
