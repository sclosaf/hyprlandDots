# ============================
#  TOUCHPAD SPECIFIC SETTINGS
# ============================
input:touchpad {
    disable_while_typing = true         # Automatic touchpad disable when typing
    natural_scroll = false              # Reverse scroll direction
    scroll_factor = 1.0                 # Scroll speed multiplier
    middle_button_emulation = false     # LMB+RMB = Middle Click
    tap_button_map =                    # Button mapping (lrm/lmr)
    clickfinger_behavior = false        # Finger count determines button press
    tap-to-click = true                # Enable tap-to-click
    drag_lock = 0                       # 0=off, 1=timeout, 2=sticky
    tap-and-drag = true                # Enable tap-and-drag
    flip_x = false                      # Reverse horizontal movement
    flip_y = false                      # Reverse vertical movement
    drag_3fg = 0                        # Three/four finger drag (0=off, 1=3fg, 2=4fg)
}
