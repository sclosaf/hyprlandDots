# ---------- Font ----------
font_family      JetBrains Mono Nerd Font
font_size        12.0

# ---------- Include palette ----------
include nord.conf

# ---------- Cursor ----------
# cursor_shape     block
# cursor_beam_thickness 2
# cursor_underline_thickness 2

# ---------- Window ----------
# window_title_template kitty
# inactive_border_color #2E3440
# active_border_color   #81A1C1

# ---------- Scrolling ----------
# scrollback_lines 10000

# ---------- Other ----------
# middle_click_paste yes
# enable_kitty_graphics yes
